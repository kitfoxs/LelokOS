name: LelokOS
options:
  bundleIdPrefix: com.lelock
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""

targets:
  LelokOS:
    type: application
    platform: macOS
    sources:
      - path: LelokOS/Shared
        group: Shared
    entitlements:
      path: LelokOS/LelokOS.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lelock.os
        PRODUCT_NAME: "Lelock OS"
        CODE_SIGN_ENTITLEMENTS: LelokOS/LelokOS.entitlements
        ENABLE_HARDENED_RUNTIME: NO
        INFOPLIST_GENERATION_MODE: GeneratedFile
        INFOPLIST_KEY_CFBundleDisplayName: "Lelock OS"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSMainStoryboardFile: ""
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
